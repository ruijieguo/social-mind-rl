# Stage-16 (1×8 H800, Qwen3-14B): v3.2 = continue from v3.1 with Hi-ToM + EmoBench data
#
# Init: Stage 14b ckpt-199 HF (v3.1, project record 0.7875 del_tom on full ToMBench).
# Data: tom_train_stage16.jsonl (~17.1k):
#   - tom_train_stage14_weighted.jsonl backbone (14408)
#   - hitom_synth 1200 (5 orders × 240, 15-opt MCQ)
#   - synth_eu_emotion 500 (6-opt emotion-naming)
#   - synth_eu_cause 300 (4-opt cause-of-emotion)
#   - synth_ea 300 (4-opt action-choice)
#   - synth_socialiqa 400 (3-opt commonsense)
#
# Why this stage exists:
#   v3.1 + ToMBench backbone is saturated; Hi-ToM order_2-4 and EU_emotion
#   eval show +20-42pp gap vs DeepSeek precisely because training data
#   never contained 6/15-opt format and never multi-order belief tracking.
#   This stage adds those structural data shapes, with reward worker now
#   supporting A-Z and task-aware long-CoT (l_max_long=512 for Hi-ToM).
#
# Differences vs Stage 14b:
#   - response_length 256 → 512 (Hi-ToM needs long CoT)
#   - max_model_len   2048 → 2304 (prompt 1024 + response 512 + slack)
#   - learning_rate   1e-6 → 5e-7 (smaller, continue-training)
#   - max_steps       200 → 300
#   - save_steps      50 → 30 (denser ckpts to catch peak)
#   - difficulty_low  0.15 → 0.05 (allow Hi-ToM order_4 1/8-correct samples)
#   - reward l_max    256 (default) + l_max_long 512 (Hi-ToM only)
#   - validation: + tombench/hitom200/emobench100 (3 files, accuracy stops on regression)
#   - pretrain init from Stage 14b (v3.1) HF
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-14B-tombench-rlvr-stage16-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 300
save_steps: 30
logging_steps: 1
eval_steps: 30
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 1024
response_length: 512

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
# Wider lower bound to keep Hi-ToM order_4 (where v3.1 group pass rate ~0.05-0.10)
# in the gradient flow. Stage 14b used 0.15 which masked nearly all Hi-ToM order_4.
difficulty_low_threshold: 0.05
difficulty_high_threshold: 0.85
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

add_token_level_kl: false

whiten_advantages: true

use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

# Init from Stage 14b ckpt-199 (v3.1 production_frozen 14B)
pretrain: /mnt/output/qwen3-14B-tombench-rlvr-stage14b-1x8-hf-ckpt199
reward_pretrain: /mnt/output/qwen3-14B-tombench-rlvr-stage14b-1x8-hf-ckpt199

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
      - /mnt/data/hitom_eval_val200.jsonl
      - /mnt/data/emobench_eu_emotion_val100.jsonl
  generating_args:
    max_new_tokens: 256
    top_p: 1.0
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 5.0e-7
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 30
    num_train_epochs: 50
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tom_train_stage16.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      # Lowered from 0.55 to 0.45 to accommodate longer max_model_len.
      gpu_memory_utilization: 0.45
      block_size: 16
      max_model_len: 2304
      tensor_parallel_size: 2
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    l_min: 8
    l_max: 256
    # Stage 16 task-aware: Hi-ToM samples (source=hitom_synth or task=order_*)
    # use l_max_long instead of l_max so long CoT (~400-500 tokens) is rewarded.
    l_max_long: 512
    k: 50
