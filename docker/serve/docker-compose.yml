services:
  serve:
    build:
      context: ../..
      dockerfile: docker/serve/Dockerfile
    image: qwen3-tom-serve:latest
    working_dir: /workspace
    volumes:
      - ${TRAIN_OUTPUT_DIR:-/data_nvme/grj-projects/tom-output}:/mnt/output
    environment:
      MODEL_PATH: /mnt/output/final_model
      SERVE_PORT: ${SERVE_PORT:-8000}
      SERVED_MODEL_NAME: qwen3-8b-tom
    ports:
      - "${SERVE_PORT:-8000}:${SERVE_PORT:-8000}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    shm_size: 16gb
