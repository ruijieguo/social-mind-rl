services:
  train:
    build:
      context: ../..
      dockerfile: docker/train/Dockerfile
    image: qwen3-tom-train:latest
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - ${TRAIN_DATA_DIR:-/data_nvme/grj-projects/tom-data}:/mnt/data
      - ${TRAIN_MODELS_DIR:-/data_nvme/grj-projects/models}:/mnt/models
      - ${TRAIN_OUTPUT_DIR:-/data_nvme/grj-projects/tom-output}:/mnt/output
    environment:
      STAGE: ${STAGE:-stage1}
      USE_MODELSCOPE: '1'
      PYTHONPATH: /workspace:/workspace/framework/ROLL
      HF_HOME: /mnt/models/.cache/huggingface
      MODELSCOPE_CACHE: /mnt/models/.cache/modelscope
      # Reduce memory fragmentation so colocated train/infer/reference + save
      # can coexist on 80 GB H800. Without this, save_checkpoint OOMs at ~75
      # GiB allocated while needing another 4 GiB for optimizer reshard.
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    # CUDA IPC across processes uses pidfd_getfd, which needs SYS_PTRACE.
    # Without it ROLL's model weight sync from train→infer workers fails:
    #   RuntimeError: pidfd_getfd: Operation not permitted
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 64gb
