# Stage-5 (1x8 H800): Phase-1 fixed data + KL OFF (recovery from stage4 failure)
#
# Lessons from stage4 (FAILED — rollout stuck at 0.17-0.29):
#   1. ROOT CAUSE: stage4 rolled out at 0.17-0.29 vs stage3's 0.50 peak.
#      Two interacting issues uncovered:
#      a) Phase-1 faux_pas data had empty opt_c/opt_d (mimicking ToMBench's
#         binary faux-pas convention) — but training data uniformity matters,
#         and this 800-record subset broke the 4-option distribution that the
#         reward worker / format reward expect. Fixed in
#         scripts/data/fix_faux_pas_options.py: now all 799 records have
#         valid C/D distractors.
#      b) Even with KL=true on stage3 it kept Belief/FB but REGRESSED on
#         Knowledge / Desire / Non-literal Comm. With NEW data + KL=true,
#         the regression amplified into total stagnation.
#
# Strategy for stage5:
#   - DROP add_token_level_kl (back to stage1/2 behavior — proven to learn).
#     We accept losing stage3's Belief/FB peak in favor of a model that
#     actually learns from the new data.
#   - Use the FIXED Phase-1 data (faux_pas now 4-option) — should help
#     Non-literal Comm + Knowledge tasks that stage1/2/3 stagnated on.
#   - max_steps 250 (between stage1's 200 and stage3's 300; stage2's 500
#     was confirmed overfit; stage1's 200 was confirmed under-trained).
#   - response_length: 256 (stage4 confirmed 384 makes val unreliable).
#   - save_steps: 250 (one ckpt at end).
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-8B-tombench-rlvr-stage5-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 250
save_steps: 250
logging_steps: 1
eval_steps: 50
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 2048
response_length: 256

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

# DAPO Clip-Higher
use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
difficulty_low_threshold: 0.1
difficulty_high_threshold: 0.95
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

# Disable token-level KL. Stage4 showed that KL on top of new data caused
# rollout score to STAGNATE in 0.17-0.29 (vs stage1/2's 0.50+ same step).
# We learned in stage3 that KL preserves Belief/FB at the cost of Knowledge/
# Non-literal Comm. With the targeted Phase-1 data filling those gaps, we
# don't need KL to "protect" the base distribution — the data itself does
# that work.
add_token_level_kl: false

whiten_advantages: true

# DAPO Dynamic Sampling
use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

pretrain: Qwen/Qwen3-8B
reward_pretrain: Qwen/Qwen3-8B

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
  generating_args:
    max_new_tokens: 64
    top_p: 1.0
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tom_train.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.6
      block_size: 16
      max_model_len: 4096
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    l_min: 8
    # back to 256 (matches response_length)
    l_max: 256
    k: 50
