# Stage-22 / v4.0 "Plan A" (1×8 H800, Qwen3-14B): unshackle the thinking budget.
#
# WHY (see experiment/qwen3-14b-full-eval/output/insight_and_optimization_2026-05-30.md):
#   The 2026-05-30 4-benchmark eval proved the 14B RLVR line traded GENERAL ToM
#   ability for ToMBench points. Mechanism, triple-confirmed:
#     1. response_length=256 capped rollout thinking.
#     2. reward = MULTIPLICATIVE r_fmt*r_out*r_len, and r_len = sigmoid_window
#        collapses to ~0 once a response exceeds l_max=256 tokens — so a CORRECT
#        answer that thinks >256 tokens earns ~0 reward. This brutally trains
#        compression.
#     3. Result: base thinks ~11k chars on Hi-ToM and scores 0.795; the trained
#        models think 2.6-4.4k chars and collapse to 0.70-0.74 (regression is
#        MONOTONIC in reasoning depth — order_1: base .82 → v3.1 .67).
#   Model soup (base⊕v3.1) confirmed no weight interpolation beats base on the
#   4-benchmark mean — the only way out is to change the training objective.
#
# WHAT Plan A changes vs Stage 14 (v3.1):
#   - response_length        256  → 2048      (let rollouts think)
#   - reward aggregation      multiplicative → weighted_sum  (length is a 5% soft
#                              preference, NOT a hard gate that zeros correct answers)
#   - reward l_max            256  → 2048,  l_max_long 4096 (Hi-ToM), l_max_short 512
#   - use_kl_loss            (off) → true, kl_loss_coef 0.001  (anchor to BASE so the
#                              policy keeps base's long-chain generalization)
#   - pretrain / reference    Stage 12 → BASE Qwen3-14B  (start from the
#                              generalization-optimal point; KL holds it there)
#   - actor_infer max_model_len 2048 → 4096   (fits prompt 1024 + response 2048)
#   - validation max_new_tokens 64 → 2048     (measure THINKING quality, not 64-tok
#                              direct — a long-thinking model scores ~0 on 64 tokens)
#   - save_steps 50 → 25, select ckpt by 4-BENCHMARK MEAN, not ToMBench (Plan E)
#
# Data is UNCHANGED from v3.1 (ToMBench-weighted) so this is a clean A/B on the
# training dynamics. Adding Hi-ToM/SocialIQA/EmoBench to the reward is Plan B.
#
# HYPOTHESIS: from base + long thinking + KL anchor, RL adds ToMBench WITHOUT the
# generalization tax → 4-benchmark mean > base 0.7603 (vs v3.1's 0.7305).
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-14B-tombench-rlvr-stage22-planA-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 200
save_steps: 25          # frequent ckpts — capture peak before any late collapse
                        # (cf. stage17 Dr.GRPO collapse after step 100)
logging_steps: 1
eval_steps: 25
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 1024
response_length: 2048   # was 256 — THE core change. Lets rollouts keep long chains.

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
# From BASE the pass rate is lower and more spread, and we just recovered the
# HARDEST data (ExploreToM + HOT). Use Stage 9's proven-loose window so hard-but-
# learnable items (1/8 correct = 0.125) aren't masked out. (Stage 9: 0.05/0.97.)
difficulty_low_threshold: 0.05
difficulty_high_threshold: 0.95
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

# KL anchor to the reference (BASE) — keeps the policy in base's long-chain basin
# while the ToMBench reward pulls accuracy up. 0.001 proven in Stage 9
# (Stage 3's 0.01 was too heavy and stalled learning).
add_token_level_kl: false
use_kl_loss: true
kl_loss_coef: 0.001

whiten_advantages: true

use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

# Init from BASE Qwen3-14B (downloaded to /mnt/models/Qwen3-14B). reference == this,
# so KL anchors to base. reward_pretrain only needs the tokenizer.
pretrain: /mnt/models/Qwen3-14B
reward_pretrain: /mnt/models/Qwen3-14B

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
  generating_args:
    max_new_tokens: 2048    # was 64 — measure thinking, not a 64-token direct answer
    top_p: 0.95
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen3
    # FIXED data (see scripts/data/build_planA_data.py + data_audit_2026-05-30.md):
    #   - re-tagged all records tom_mcq → recovers the 26% (ExploreToM + HOT
    #     higher-order ToM) that v3.1 silently dropped via the tag→math_rule filter
    #   - gold rebalanced A=45%/D=10% → ~25% each (removes the position prior)
    file_name:
      - /mnt/data/tom_train_stage22_planA.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.45   # Stage 9's proven value for 4096 ctx colocated
                                     # (train+ref+infer on the same 8 GPUs). 0.60 risks OOM.
      block_size: 16
      max_model_len: 4096            # prompt 1024 + response 2048, headroom
      tensor_parallel_size: 2
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    # weighted_sum so length is a SOFT 5% preference, never a gate that zeros a
    # correct answer (the v3.1 multiplicative trap). r_out (correctness) dominates.
    aggregation: weighted_sum
    r_fmt_weight: 0.05
    r_out_weight: 0.90
    r_len_weight: 0.05
    l_min: 8
    l_max: 2048          # was 256 — the length window now spans the full budget
    l_max_long: 4096     # Hi-ToM order_2+ may legitimately need the longest chains
    l_max_short: 512     # direct-style samples (if any) stay compact
    k: 50
