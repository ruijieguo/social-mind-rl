# Stage-3 (1x8 H800): bad-case-informed iteration
#
# Differences from stage2 (informed by docs/badcase_analysis.md):
#   - max_steps: 300 (stage2 val peaked at step 200-250; stage2 over-trained)
#   - save_steps: 150 (mid-train checkpoint to compare against end-of-train)
#   - add_token_level_kl: true (prevent False Belief mode collapse; stage2 lost
#     82/130 FB correct -> wrong due to 1st/2nd-order belief mixup)
#   - response_length: 384 (8% of stage2 errors were truncated at 256)
#   - l_max in reward worker bumped 256 -> 384 to match
#   - data file: tom_train.jsonl (7911 records, same as stage2). New synthesized
#     data from phase-1 will be used in stage4, not stage3 (stage3 runs in
#     parallel with data synthesis on DEV).
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-8B-tombench-rlvr-stage3-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 300
# Two checkpoints: mid-train (step 150) for early-stop comparison, final (300).
# NVMe has 13 TB free so 2x 112 GB ckpts is fine.
save_steps: 150
logging_steps: 1
eval_steps: 50
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 2048
# Bumped from 256 -> 384 because 8% of stage2 errors had reasoning truncated
# at the 256-token cap, leading to missing \boxed{X} in the final position.
response_length: 384

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

# DAPO Clip-Higher
use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
difficulty_low_threshold: 0.1
difficulty_high_threshold: 0.95
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

# Enable token-level KL penalty. Stage2 trained 500 steps and lost generalization
# in 5/7 tasks (especially False Belief, where rollout score saturated to 0.97
# but val plateaued at 0.65). Token-level KL anchors per-token distribution to
# the reference model, which should preserve robust reasoning patterns.
add_token_level_kl: true

whiten_advantages: true

# DAPO Dynamic Sampling
use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

pretrain: Qwen/Qwen3-8B
reward_pretrain: Qwen/Qwen3-8B

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
  generating_args:
    max_new_tokens: 64
    top_p: 1.0
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tom_train.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.6
      block_size: 16
      max_model_len: 4096
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    l_min: 8
    # bumped 256 -> 384 to match response_length
    l_max: 384
    k: 50
