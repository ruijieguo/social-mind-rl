# Stage-4 (1x8 H800): Phase-1 data + revised KL configuration
#
# Lessons from stage3 (see docs/stage3_report.md):
#   - KL penalty WORKED for Belief / False Belief — both exceeded deepseek
#   - But Knowledge / Desire / Non-literal Comm REGRESSED, because the strong
#     KL anchor prevented learning new patterns from training data
#   - response_length=384 created a mismatch with ROLL's val_correct (uses
#     max_new_tokens=64) — val_correct hugely under-reported real ability.
#     Final 5718 eval with max_tokens=2048 showed 0.7302 vs val 0.230!
#
# Changes from stage3:
#   - response_length: 384 -> 256 (align with val 64 truncation, simpler)
#   - l_max: 384 -> 256 (match)
#   - save_steps: 150 -> 300 (one ckpt at end; midpoint not informative)
#   - data: tom_train.jsonl now has 8902 records including Phase-1 synthesis
#     (~800 faux-pas, ~450 scalar implicature, ~250 hinting, ~300 2nd-order
#     false belief). See docs/badcase_analysis.md for the targeting rationale.
#   - everything else kept identical to stage3 (KL stays ON since it gave
#     us Belief/FB wins).
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-8B-tombench-rlvr-stage4-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 300
# Single checkpoint at end. Saves 112 GB upload time.
save_steps: 300
logging_steps: 1
eval_steps: 50
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 2048
# Back to 256 (same as stage1/stage2 baseline). 384 in stage3 caused
# val_correct to under-report because ROLL val uses max_new_tokens=64.
response_length: 256

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

# DAPO Clip-Higher
use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
difficulty_low_threshold: 0.1
difficulty_high_threshold: 0.95
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

# Enable token-level KL penalty. Stage2 trained 500 steps and lost generalization
# in 5/7 tasks (especially False Belief, where rollout score saturated to 0.97
# but val plateaued at 0.65). Token-level KL anchors per-token distribution to
# the reference model, which should preserve robust reasoning patterns.
add_token_level_kl: true

whiten_advantages: true

# DAPO Dynamic Sampling
use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

pretrain: Qwen/Qwen3-8B
reward_pretrain: Qwen/Qwen3-8B

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
  generating_args:
    max_new_tokens: 64
    top_p: 1.0
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tom_train.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.6
      block_size: 16
      max_model_len: 4096
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    l_min: 8
    # back to 256 (matches response_length)
    l_max: 256
    k: 50
