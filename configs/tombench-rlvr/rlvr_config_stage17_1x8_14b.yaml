# Stage-17 (1×8 H800, Qwen3-14B): v3.3 = continue from v3.2 with targeted gap-closing data
#
# Init: Stage 16 ckpt-270 HF (v3.2, 800-q val_all=0.6825 peak).
# Data: tom_train_stage17.jsonl (~18.9k):
#   - tom_train_stage16 backbone (14439, includes prior Hi-ToM/EmoBench/SocialIQA)
#   - hitom_synth_direct 960 (Hi-ToM direct-style, l_max=64 enforced via reward worker)
#   - synth_eu_emotion_v33 1500 (closes +20pp EU_emotion gap)
#   - synth_eu_cause_v33 500
#   - synth_ea_v33 400
#   - synth_socialiqa_v33 500
#   - belief_distill_v33 ~600 (DeepSeek-distilled CoT for Belief errors)
#
# Why this stage exists:
#   v3.2 closed the data-shape gaps (Hi-ToM 15-opt, EU_emotion 6-opt) but residual
#   per-task gaps remain: Hi-ToM direct order_2 +34pp, EU_emotion +20pp, Belief +11pp.
#   v3.3 adds targeted data per gap-source.
#
# Differences vs Stage 16:
#   - response_length 512 → 640 (Hi-ToM cot/EmoBench reasoning needs more headroom)
#   - max_model_len   2304 → 2816 (prompt 1024 + response 640 + slack)
#   - learning_rate   5e-7 → 3e-7 (continue-train v3.2 needs smaller LR)
#   - max_steps       300 → 200 (v3.3 data is more focused, shorter sched)
#   - save_steps      30 → 20 (denser ckpts)
#   - eval_steps      30 → 20
#   - warmup_steps    30 → 20
#   - reward.l_max    256 → 128 (most non-Hi-ToM data should answer briefly)
#   - reward.l_max_long  512 → 640 (matches response_length)
#   - reward.l_max_short 64 (NEW: source-aware, applies to hitom_synth_direct)
#   - validation: same 800-q (subset500 + hitom_val200 + emobench_eu_emotion_val100)
#   - pretrain init from Stage 16 ckpt-270
hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3-14B-tombench-rlvr-stage17-1x8"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
system_envs:
  USE_MODELSCOPE: '1'

checkpoint_config:
  type: file_system
  output_dir: /mnt/output/${exp_name}

track_with: stdout
tracker_kwargs: {}

num_gpus_per_node: 8

max_steps: 200
save_steps: 20
logging_steps: 1
eval_steps: 20
resume_from_checkpoint: false

rollout_batch_size: 32
prompt_length: 1024
response_length: 640

num_return_sequences_in_group: 8
ppo_epochs: 1
adv_estimator: "grpo"

use_pg_clip_range: true
pg_clip_low: 0.20
pg_clip_high: 0.28
dual_clip_loss: true

value_clip: 0.5
reward_clip: 5
advantage_clip: 2.0

norm_mean_type: ~
norm_std_type: ~

max_len_mask: true
difficulty_mask: true
difficulty_low_threshold: 0.05
difficulty_high_threshold: 0.85
error_max_len_clip: false

difficulty_loss_weight: false
length_loss_weight: false

add_token_level_kl: false

whiten_advantages: true

use_additional_prompts: true
max_running_requests: 128
is_num_return_sequences_expand: false

# Init from Stage 16 ckpt-270 (v3.2)
pretrain: /mnt/output/qwen3-14B-tombench-rlvr-stage16-1x8-hf-ckpt270
reward_pretrain: /mnt/output/qwen3-14B-tombench-rlvr-stage16-1x8-hf-ckpt270

validation:
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tombench_eval_subset500.jsonl
      - /mnt/data/hitom_eval_val200.jsonl
      - /mnt/data/emobench_eu_emotion_val100.jsonl
  generating_args:
    max_new_tokens: 320
    top_p: 1.0
    top_k: -1
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1

actor_train:
  model_args:
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 3.0e-7
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 20
    num_train_epochs: 50
  data_args:
    template: qwen3
    file_name:
      - /mnt/data/tom_train_stage17.jsonl
    domain_interleave_probs:
      tom_mcq: 1.0
    dataset_dir: /mnt/data
    messages: messages
    interleave_probs: "1.0"
    preprocessing_num_workers: 16
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      distrib_optim_fully_reshardable_mem_efficient: true
      recompute_granularity: full
  device_mapping: list(range(0,8))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${response_length}
    top_p: 0.95
    top_k: 50
    num_beams: 1
    temperature: 0.99
    num_return_sequences: ${num_return_sequences_in_group}
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: vllm
    strategy_config:
      # Tighter for 2816 max_model_len.
      gpu_memory_utilization: 0.42
      block_size: 16
      max_model_len: 2816
      tensor_parallel_size: 2
  device_mapping: list(range(0,8))
  infer_batch_size: 1

reference:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen3
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 2
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  device_mapping: list(range(0,8))
  infer_batch_size: 4

rewards:
  tom_mcq:
    worker_cls: roll.pipeline.rlvr.rewards.tom_mcq_reward_worker.TomMcqRewardWorker
    tag_included: [tom_mcq]
    model_args:
      model_name_or_path: ${reward_pretrain}
    data_args:
      template: qwen3
    world_size: 8
    infer_batch_size: 16
    l_min: 8
    l_max: 128
    # Stage 17: Hi-ToM cot/del_tom samples use l_max_long; direct-style samples
    # (source=hitom_synth_direct) use l_max_short to enforce compressed answers.
    l_max_long: 640
    l_max_short: 64
    k: 50
