# Parameterized dp4 serve for per-ckpt eval on .191 (all 8 H800).
# 4 vLLM instances × TP=2 (GPU pairs), ports 8001-8004. MODEL_PATH/SERVED_NAME
# come from env so one compose serves any converted ckpt (or base). 14B BF16
# (~28GB) at TP=2 = ~14GB/GPU + KV; gpu_util 0.85 leaves ample KV headroom.
#
# Up:   MODEL_PATH=... SERVED_NAME=... docker compose -f docker/serve_dp4.yml up -d
# Down: docker compose -f docker/serve_dp4.yml down

x-serve: &serve
  image: qwen3-tom-serve-eval-dp4:latest
  working_dir: /workspace
  network_mode: host
  volumes:
    - ${MODEL_HOST_DIR:-/home/h800/grj-projects}:${MODEL_HOST_DIR:-/home/h800/grj-projects}:ro
  environment: &serveenv
    SERVE_PORT_BASE: ${SERVE_PORT_BASE:-8001}
    MODEL_PATH: ${MODEL_PATH}
    SERVED_NAME: ${SERVED_NAME}
    MAX_MODEL_LEN: ${MAX_MODEL_LEN:-16384}
    TENSOR_PARALLEL: 2
    GPU_UTIL: ${GPU_UTIL:-0.85}
  ipc: host
  shm_size: 16gb
  restart: "no"

services:
  serve_0:
    <<: *serve
    container_name: qwen3-14b-posteval-0
    environment: {<<: *serveenv, INSTANCE_IDX: 0}
    deploy: {resources: {reservations: {devices: [{driver: nvidia, device_ids: ["0","1"], capabilities: [gpu]}]}}}
  serve_1:
    <<: *serve
    container_name: qwen3-14b-posteval-1
    environment: {<<: *serveenv, INSTANCE_IDX: 1}
    deploy: {resources: {reservations: {devices: [{driver: nvidia, device_ids: ["2","3"], capabilities: [gpu]}]}}}
  serve_2:
    <<: *serve
    container_name: qwen3-14b-posteval-2
    environment: {<<: *serveenv, INSTANCE_IDX: 2}
    deploy: {resources: {reservations: {devices: [{driver: nvidia, device_ids: ["4","5"], capabilities: [gpu]}]}}}
  serve_3:
    <<: *serve
    container_name: qwen3-14b-posteval-3
    environment: {<<: *serveenv, INSTANCE_IDX: 3}
    deploy: {resources: {reservations: {devices: [{driver: nvidia, device_ids: ["6","7"], capabilities: [gpu]}]}}}
