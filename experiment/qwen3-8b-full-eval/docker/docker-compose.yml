# Qwen3-8B full-eval — 8 vLLM instances on a single 8×H800 host (172.16.120.191).
#
# Layout:
#   GPU 0..3 → 8B base    (ports 8001..8004)
#   GPU 4..7 → 8B v1.0    (ports 8005..8008)
#
# All 4 instances of the same model share `--served-model-name`, so a single
# OpenAI-compatible client can round-robin across endpoints transparently.
#
# Up:    docker compose -f docker/docker-compose.yml --env-file ../configs/deploy.env.191 up -d
# Logs:  docker compose -f docker/docker-compose.yml logs -f serve_base_0
# Down:  docker compose -f docker/docker-compose.yml down

x-base-serve: &base-serve
  image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.11.0}
  ipc: host
  shm_size: 16gb
  restart: unless-stopped
  volumes:
    - /model:/model:ro
    - /home/h800/xujiayuan/models:/home/h800/xujiayuan/models:ro

services:
  serve_base_0:
    <<: *base-serve
    container_name: qwen3-eval-base-0
    command:
      - "--model"
      - "${BASE_MODEL_PATH:-/model/Qwen3-8B}"
      - "--served-model-name"
      - "${BASE_MODEL_NAME:-qwen3-8b-base}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--tensor-parallel-size"
      - "1"
      - "--max-model-len"
      - "${MAX_MODEL_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${GPU_UTIL:-0.85}"
      - "--disable-log-requests"
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  serve_base_1:
    <<: *base-serve
    container_name: qwen3-eval-base-1
    command:
      - "--model"
      - "${BASE_MODEL_PATH:-/model/Qwen3-8B}"
      - "--served-model-name"
      - "${BASE_MODEL_NAME:-qwen3-8b-base}"
      - "--host"
      - "0.0.0.0"
